name: CGL
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cgl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      # Prepare environment
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          # We use the minimum supported PHP version
          php-version: 8.2
          tools: composer:v2, cs2pr
          coverage: none

      # Install dependencies
      - name: Install Composer dependencies
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6 # v4

      # Validation
      - name: Validate composer.json
        run: composer validate --strict
      - name: Audit Composer dependencies
        run: composer audit

      # Checks
      - name: Check dependencies
        run: composer check:deps
      - name: Check for possible refactorings
        run: composer check:refactor
      - name: Run static code analysis
        run: composer check:static -- --error-format github
      - name: Check code style
        run: composer check:style

      # Documentation
      - name: Check documentation build
        run: |
          mkdir -p Build/docs/result
          composer docs:build -- --no-progress --fail-on-log

      # Bundler
      - name: Check dependency extraction for TER vendor libraries
        run: composer extract-dependencies --print-file-contents --fail
